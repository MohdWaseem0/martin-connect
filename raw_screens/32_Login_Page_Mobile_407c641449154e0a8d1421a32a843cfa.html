<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-sharp-shadow {
            box-shadow: 0px 2px 4px rgba(8, 17, 38, 0.05), 0px 1px 2px rgba(8, 17, 38, 0.1);
        }
        input:focus {
            outline: none !important;
            border-color: #1E63F3 !important;
            box-shadow: 0 0 0 2px rgba(30, 99, 243, 0.1) !important;
        }
        .bg-login-gradient {
            background: radial-gradient(circle at top right, #e2e7ff 0%, #faf8ff 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center overflow-x-hidden p-md bg-login-gradient">
<!-- Top Branding Section -->
<header class="w-full max-w-sm mb-xl text-center">
<div class="mb-lg flex justify-center">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center shadow-lg transform rotate-3">
<span class="material-symbols-outlined text-white text-4xl" data-icon="hub">hub</span>
</div>
</div>
<h1 class="font-headline-sm text-headline-sm text-primary mb-xs">Martin Connect</h1>
<p class="font-body-md text-body-md text-on-surface-variant">The Industrial Recruitment Hub</p>
</header>
<!-- Main Login Card -->
<main class="w-full max-w-sm bg-surface-container-lowest border border-outline-variant rounded-xl soft-sharp-shadow p-lg relative overflow-hidden">
<!-- Decorative Accent -->
<div class="absolute top-0 left-0 w-1 h-full bg-primary-container"></div>
<form class="space-y-lg" onsubmit="event.preventDefault();">
<!-- Input: Email -->
<div class="space-y-xs">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant block ml-xs" for="email">Corporate Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-[48px] pr-md py-md bg-surface border border-outline-variant rounded-lg font-body-md focus:ring-primary-container focus:border-primary-container transition-all" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Input: Password -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-body-sm text-body-sm font-bold text-on-surface-variant block" for="password">Password</label>
<a class="text-primary font-body-sm text-body-sm hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-[48px] pr-md py-md bg-surface border border-outline-variant rounded-lg font-body-md focus:ring-primary-container focus:border-primary-container transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action: Sign In -->
<button class="w-full bg-primary-container text-white font-title-sm text-title-sm py-md rounded-lg active:scale-[0.98] transition-transform shadow-md flex items-center justify-center gap-sm" type="submit">
                Sign In
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md my-xl">
<div class="h-px bg-outline-variant flex-grow"></div>
<span class="font-mono-label text-mono-label text-outline uppercase tracking-wider">or join with</span>
<div class="h-px bg-outline-variant flex-grow"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-md mb-lg">
<button class="flex items-center justify-center gap-sm py-md border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-colors">
<img alt="Google" class="w-5 h-5" data-alt="A clean, isolated professional rendering of the Google logo for a modern corporate login screen. The colors are crisp and high-contrast against a white background, representing digital integration and reliability. The lighting is soft and even, highlighting the sleek minimalist design of the interface. This asset is intended to convey seamless authentication within a high-performance industrial tech platform." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC5oSWy4-aWh9C49sn_u4zxGYRMmvPspxp_GV4jCBl5lvyMHurjjklMKauMuzPsquVzStrSGdAE1aV-PFId_yZuNC7NpFFNX14LtPKGwiUxlj_78EALRsSCah1MoEeD14raJfzVw_eSAav9RU1YP_jDoGGabvVMAG0YwjOyC_JkN4rA6iJBf4P_EDwRuSpsNcrKcBKUdEBGwlE8tJfxrdPqSX9A5QHFfR6Y5T8DGXPMUXYhnCdQbh1JHEyt245Tcrypp9Qcjfjr7PQ"/>
<span class="font-body-md text-body-md font-bold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-sm py-md border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-blue-700" data-icon="linkedin" data-weight="fill" style="font-variation-settings: 'FILL' 1;">dine_in</span>
<span class="font-body-md text-body-md font-bold text-on-surface">LinkedIn</span>
</button>
</div>
</main>
<!-- Footer Action -->
<footer class="mt-lg w-full max-w-sm text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
            Don't have an account? 
            <a class="text-primary font-bold hover:underline" href="#">Request Access</a>
</p>
</footer>
<!-- Bottom Illustration (Mobile Optimization) -->
<div class="fixed bottom-0 left-0 w-full h-1/4 opacity-10 pointer-events-none -z-10 overflow-hidden">
<div class="flex justify-around items-end h-full">
<div class="w-24 h-48 bg-primary rounded-t-full"></div>
<div class="w-16 h-32 bg-secondary rounded-t-full"></div>
<div class="w-32 h-64 bg-tertiary rounded-t-full"></div>
<div class="w-20 h-40 bg-primary-fixed rounded-t-full"></div>
</div>
</div>
<!-- Micro-interactions Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').classList.remove('text-primary');
            });
        });

        // Toggle Password Visibility
        const passInput = document.getElementById('password');
        const passToggle = passInput.nextElementSibling;
        passToggle.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            passToggle.querySelector('span').innerText = isPass ? 'visibility_off' : 'visibility';
        });
    </script>
</body></html>
