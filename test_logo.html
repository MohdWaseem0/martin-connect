<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logo Preview</title>
  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      padding: 50px;
      margin: 0;
    }
    .preview-section {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .preview-box {
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      min-width: 320px;
    }
    .logo-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .logo-container.dark-bg {
      background: #081126;
      border: 1px solid rgba(255,255,255,0.1);
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 0;
    }
    p {
      color: #94a3b8;
      margin-top: 0;
    }
    .title {
      font-weight: 600;
      margin-bottom: 5px;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <h1>Martin Connect Logo Preview</h1>
  <p>The final, official same-to-same brand logo in light and dark background contexts.</p>
  
  <div class="preview-section">
    <div class="preview-box">
      <div class="title">Light Background (Main Logo)</div>
      <div class="logo-container">
        <!-- SVG matching the updated Logo component (light = false) -->
        <div style="display: flex; flex-direction: column; user-select: none;">
          <div style="display: flex; align-items: center; gap: 9px;">
            <svg width="48" height="48" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="leftFigureGradDark" x1="31" y1="20" x2="59" y2="120" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#1E63F3" />
                  <stop offset="100%" stop-color="#081126" />
                </linearGradient>
                <linearGradient id="rightFigureGrad" x1="81" y1="20" x2="109" y2="120" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#00D2FF" />
                  <stop offset="100%" stop-color="#1E63F3" />
                </linearGradient>
              </defs>
              <circle cx="45" cy="32" r="13.5" fill="url(#leftFigureGradDark)" />
              <path d="M 31 121 L 31 67 A 14 14 0 0 1 59 67 L 59 121 Z" fill="url(#leftFigureGradDark)" />
              <circle cx="95" cy="32" r="13.5" fill="url(#rightFigureGrad)" />
              <path d="M 81 121 L 81 67 A 14 14 0 0 1 109 67 L 109 121 Z" fill="url(#rightFigureGrad)" />
              <path d="M 52 76 L 68 92 C 73 97 74 104 70 108 C 66 112 59 111 56 106 C 53 101 55 94 61 91" stroke="url(#leftFigureGradDark)" stroke-width="11.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
              <path d="M 88 76 L 72 92 C 67 97 66 104 70 108 C 74 112 81 111 84 106 C 87 101 85 94 79 91" stroke="url(#rightFigureGrad)" stroke-width="11.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
            <div style="display: flex; flex-direction: column; justify-content: center; line-height: 1.05; font-family: 'DM Sans', sans-serif;">
              <span style="color: #081126; font-weight: 700; font-size: 20px;">Martin</span>
              <span style="color: #1E63F3; font-weight: 700; font-size: 20px;">Connect</span>
            </div>
          </div>
          <span style="font-family: 'DM Sans', sans-serif; text-transform: uppercase; color: #737687; font-size: 10.4px; letter-spacing: 0.15em; font-weight: 600; margin-top: 7px; text-align: left;">
            Connecting Talent, Creating Futures.
          </span>
        </div>
      </div>
    </div>

    <div class="preview-box">
      <div class="title">Dark Background (Navbar Logo)</div>
      <div class="logo-container dark-bg">
        <!-- SVG matching the updated Logo component (light = true) -->
        <div style="display: flex; flex-direction: column; user-select: none;">
          <div style="display: flex; align-items: center; gap: 9px;">
            <svg width="48" height="48" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="leftFigureGradLight" x1="31" y1="20" x2="59" y2="120" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#93C5FD" />
                  <stop offset="100%" stop-color="#2563EB" />
                </linearGradient>
                <linearGradient id="rightFigureGradLight" x1="81" y1="20" x2="109" y2="120" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#00D2FF" />
                  <stop offset="100%" stop-color="#1E63F3" />
                </linearGradient>
              </defs>
              <circle cx="45" cy="32" r="13.5" fill="url(#leftFigureGradLight)" />
              <path d="M 31 121 L 31 67 A 14 14 0 0 1 59 67 L 59 121 Z" fill="url(#leftFigureGradLight)" />
              <circle cx="95" cy="32" r="13.5" fill="url(#rightFigureGradLight)" />
              <path d="M 81 121 L 81 67 A 14 14 0 0 1 109 67 L 109 121 Z" fill="url(#rightFigureGradLight)" />
              <path d="M 52 76 L 68 92 C 73 97 74 104 70 108 C 66 112 59 111 56 106 C 53 101 55 94 61 91" stroke="url(#leftFigureGradLight)" stroke-width="11.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
              <path d="M 88 76 L 72 92 C 67 97 66 104 70 108 C 74 112 81 111 84 106 C 87 101 85 94 79 91" stroke="url(#rightFigureGradLight)" stroke-width="11.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
            <div style="display: flex; flex-direction: column; justify-content: center; line-height: 1.05; font-family: 'DM Sans', sans-serif;">
              <span style="color: #ffffff; font-weight: 700; font-size: 20px;">Martin</span>
              <span style="color: #1E63F3; font-weight: 700; font-size: 20px;">Connect</span>
            </div>
          </div>
          <span style="font-family: 'DM Sans', sans-serif; text-transform: uppercase; color: rgba(255,255,255,0.7); font-size: 10.4px; letter-spacing: 0.15em; font-weight: 600; margin-top: 7px; text-align: left;">
            Connecting Talent, Creating Futures.
          </span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
